# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "76b72a7575fcfc731bba4562cf360733"
name = "Lava Favorites - Wishlist App"
application_url = "https://app.lavawishlist.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2024-10"

[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/webhooks/shop/redact"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"


[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[auth]
redirect_urls = [
  "https://app.lavawishlist.com/auth/callback",
  "https://app.lavawishlist.com/api/auth"
]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the app"

[product.metafields.app.demo_info.access]
admin = "merchant_read_write"

[metaobjects.app.example]
name = "Lava Favorites - Wishlist App"
description = "Wishlist data objects"

[metaobjects.app.example.access]
admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[app_proxy]
url = "https://app.lavawishlist.com/api/wishlist"
subpath = "wishlist"
prefix = "apps"
